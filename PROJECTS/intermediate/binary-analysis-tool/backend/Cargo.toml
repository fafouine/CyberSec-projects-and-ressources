# ©AngelaMos | 2026
# Cargo.toml

[workspace]
members = ["crates/axumortem", "crates/axumortem-engine"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tokio = { version = "1", features = ["full"] }
sha2 = "0.10"
