# .golangci.yml

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - gosec
    - bodyclose
    - nilerr
    - errorlint
    - exhaustive
    - gocritic
    - funlen
    - gocognit
    - dupl
    - goconst
    - ineffassign
    - unused
    - unconvert
    - unparam
    - testifylint
    - fatcontext

  exclusions:
    paths:
      - vendor
      - testdata
      - data
    rules:
      - path: _test\.go
        linters:
          - funlen
          - dupl
          - goconst

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    exhaustive:
      default-signifies-exhaustive: true

    funlen:
      lines: 150
      statements: 75

    gocognit:
      min-complexity: 20

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    gosec:
      excludes:
        - G101
        - G102
        - G104
        - G114
        - G115
        - G117
        - G301
        - G304
        - G402
        - G703
        - G705

issues:
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 80
      reformat-tags: true
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/CarterPerez-dev)
      custom-order: true
    gofumpt:
      extra-rules: true
